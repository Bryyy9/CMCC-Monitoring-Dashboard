<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-sm font-medium"
      [class.bg-green-100]="status === 'UP'"
      [class.text-green-800]="status === 'UP'"
      [class.bg-red-100]="status === 'DOWN'"
      [class.text-red-800]="status === 'DOWN'"
      [class.bg-gray-100]="status === 'UNKNOWN'"
      [class.text-gray-800]="status === 'UNKNOWN'">
  
  <span class="w-2 h-2 mr-1.5 rounded-full"
        [class.bg-green-500]="status === 'UP'"
        [class.bg-red-500]="status === 'DOWN'"
        [class.status-down]="status === 'DOWN'"
        [class.bg-gray-400]="status === 'UNKNOWN'">
  </span>
  {{ status }}
</span>
