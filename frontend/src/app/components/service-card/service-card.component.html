<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow">
  <div class="flex justify-between items-start mb-4">
    <div>
      <h3 class="text-lg font-semibold text-gray-900 truncate" [title]="service.name">{{ service.name }}</h3>
      <p class="text-sm text-gray-500">{{ service.category }}</p>
    </div>
    <app-status-badge [status]="service.status"></app-status-badge>
  </div>

  <div class="text-sm text-gray-600 mb-4 space-y-2">
    <div class="flex items-center">
      <svg class="w-4 h-4 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span *ngIf="service.latencyMs !== null; else noLatency">{{ service.latencyMs }} ms</span>
      <ng-template #noLatency><span>-</span></ng-template>
    </div>
    <div class="flex items-center text-xs text-gray-500">
      Last checked: {{ service.lastCheckedAt ? (service.lastCheckedAt | date:'medium') : 'Never' }}
    </div>
  </div>

  <div *ngIf="errorMsg" class="mb-3 text-xs text-red-600 bg-red-50 p-2 rounded border border-red-100">
    {{ errorMsg }}
  </div>

  <button (click)="onRecheck()" [disabled]="checking"
    class="w-full flex justify-center items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
    <svg *ngIf="checking" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    {{ checking ? 'Checking...' : 'Force Re-check' }}
  </button>
</div>
