server:
  port: 8080

spring:
  application:
    name: cmcc
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true

info:
  app:
    name: Centralized Monitoring Command Center
    version: 1.0.0
    description: Service Reliability Initiative - Fullstack Developer Test
    java-version: 20
    spring-boot-version: 3.3.0

logging:
  level:
    com.nuxatech: DEBUG
